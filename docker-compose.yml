services:
  app:
    build:
      context: .
      target: production
    image: hj-ai-server:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 11000
    ports:
      - "11000:11000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||3000)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
